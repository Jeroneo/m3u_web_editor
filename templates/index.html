<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPTV Manager</title>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00c853;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header-panel {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-top: 15px;
        }

        input, select, button {
            padding: 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
        }

        input, select {
            background: #333;
            color: white;
        }

        button {
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            filter: brightness(1.2);
        }

        .stats {
            margin-top: 10px;
            color: #aaa;
            font-weight: bold;
        }

        .channel-list {
            display: grid;
            gap: 5px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            background: var(--card);
            padding: 12px;
            border-radius: 4px;
        }

        .channel-item:hover {
            background: #2a2a2a;
        }

        input[type="checkbox"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-panel">
            <h1>IPTV Channel Manager</h1>

            <div class="stats">
                Selected Channels: <span id="selected-count">0</span>
            </div>

            <div class="controls">
                <input type="text" id="search" placeholder="Search channels..." oninput="filterChannels()">
                
                <select id="categoryFilter" onchange="filterChannels()">
                    <option value="All">All Categories</option>
                </select>

                <select id="languageFilter" onchange="filterChannels()">
                    <option value="All">All Languages</option>
                </select>

                <button onclick="triggerGenerate(event)">Generate M3U Now</button>
            </div>
        </div>

        <div id="channel-list" class="channel-list">
            Loading channels...
        </div>
    </div>

    <script>
        let allChannels = [];
        let selectedUrls = [];

        async function init() {
            try {
                // Load saved selections
                const saved = await fetch('/api/channels');
                selectedUrls = await saved.json();
                updateCounter();

                // Fetch all data in parallel
                const [streamsRes, channelsRes, feedsRes, languagesRes] = await Promise.all([
                    fetch('https://iptv-org.github.io/api/streams.json'),
                    fetch('https://iptv-org.github.io/api/channels.json'),
                    fetch('https://iptv-org.github.io/api/feeds.json'),
                    fetch('https://iptv-org.github.io/api/languages.json')
                ]);

                const streamsData = await streamsRes.json();
                const channelsData = await channelsRes.json();
                const feedsData = await feedsRes.json();
                const languagesData = await languagesRes.json();

                // Build lookup maps
                const channelById = new Map(channelsData.map(ch => [ch.id, ch]));
                const languageNameByCode = new Map(languagesData.map(lang => [lang.code, lang.name]));
                
                const feedByChannelAndId = new Map();
                const firstFeedLanguagesByChannel = new Map();

                feedsData.forEach(feed => {
                    feedByChannelAndId.set(`${feed.channel}::${feed.id}`, feed);
                    if (!firstFeedLanguagesByChannel.has(feed.channel)) {
                        firstFeedLanguagesByChannel.set(feed.channel, feed.languages);
                    }
                });

                function codesToNames(codes) {
                    return (codes || []).map(code => languageNameByCode.get(code) || code);
                }

                let categories = new Set();
                let languages = new Set();

                streamsData.forEach(stream => {
                    const channelInfo = channelById.get(stream.channel);
                    if (!stream.url || !channelInfo) return;

                    const category = (channelInfo.categories?.[0]) || "Uncategorized";
                    const feed = feedByChannelAndId.get(`${stream.channel}::${stream.feed || ""}`);
                    const languageCodes = feed?.languages || firstFeedLanguagesByChannel.get(stream.channel) || [];
                    const languageNames = codesToNames(languageCodes);
                    const languageList = languageNames.length > 0 ? languageNames : ["Unknown"];
                    
                    allChannels.push({
                        url: stream.url,
                        name: stream.title || channelInfo.name,
                        category: category,
                        language: languageList.join(", "),
                        languageList: languageList
                    });

                    categories.add(category);
                    languageList.forEach(l => languages.add(l));
                });

                // Populate Selects
                const catSelect = document.getElementById("categoryFilter");
                [...categories].sort().forEach(cat => {
                    catSelect.appendChild(new Option(cat, cat));
                });

                const langSelect = document.getElementById("languageFilter");
                [...languages].sort().forEach(lang => {
                    langSelect.appendChild(new Option(lang, lang));
                });

                render(allChannels);
            } catch (error) {
                console.error(error);
                document.getElementById("channel-list").innerHTML = "Failed to load channels";
            }
        }

        function render(list) {
            const container = document.getElementById("channel-list");
            container.innerHTML = list.map(channel => `
                <div class="channel-item">
                    <input type="checkbox" 
                        ${selectedUrls.includes(channel.url) ? "checked" : ""} 
                        onchange="toggleChannel('${escapeQuotes(channel.url)}')">
                    <span>
                        ${channel.name}
                        <small style="color:#777">(${channel.category} &middot; ${channel.language})</small>
                    </span>
                </div>
            `).join('');
        }

        function escapeQuotes(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function filterChannels() {
            const term = document.getElementById("search").value.toLowerCase();
            const category = document.getElementById("categoryFilter").value;
            const language = document.getElementById("languageFilter").value;

            const filtered = allChannels.filter(c => 
                c.name.toLowerCase().includes(term) &&
                (category === "All" || c.category === category) &&
                (language === "All" || c.languageList.includes(language))
            );
            render(filtered);
        }

        async function toggleChannel(url) {
            if (selectedUrls.includes(url)) {
                selectedUrls = selectedUrls.filter(u => u !== url);
            } else {
                selectedUrls.push(url);
            }
            updateCounter();

            await fetch('/api/channels', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(selectedUrls)
            });
        }

        function updateCounter() {
            document.getElementById("selected-count").innerText = selectedUrls.length;
        }

        async function triggerGenerate(event) {
            const button = event.target;
            button.innerText = "Generating...";
            await fetch('/api/generate', { method: "POST" });
            button.innerText = "Generate M3U Now";
            alert("Playlist generated!");
        }

        init();
    </script>
</body>
</html>
