<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPTV Manager</title>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00c853;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header-panel {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 10px;
            margin-top: 15px;
        }

        input, select, button {
            padding: 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
        }

        input, select {
            background: #333;
            color: white;
        }

        button {
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            filter: brightness(1.2);
        }

        .stats {
            margin-top: 10px;
            color: #aaa;
            font-weight: bold;
        }

        .channel-list {
            display: grid;
            gap: 5px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            background: var(--card);
            padding: 12px;
            border-radius: 4px;
        }

        .channel-item:hover {
            background: #2a2a2a;
        }

        input[type="checkbox"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header-panel">

        <h1>IPTV Channel Manager</h1>

        <div class="stats">
            Selected Channels:
            <span id="selected-count">0</span>
        </div>

        <div class="controls">

            <input 
                type="text"
                id="search"
                placeholder="Search channels..."
                oninput="filterChannels()"
            >

            <select 
                id="categoryFilter"
                onchange="filterChannels()">
                <option value="All">
                    All Categories
                </option>
            </select>

            <button onclick="triggerGenerate()">
                Generate M3U Now
            </button>

        </div>

    </div>


    <div id="channel-list" class="channel-list">
        Loading channels...
    </div>


</div>


<script>

let allChannels = [];
let selectedUrls = [];


async function init() {

    try {

        // Load saved selections
        const saved = await fetch('/api/channels');
        selectedUrls = await saved.json();

        updateCounter();


        // Load IPTV list
        const response = await fetch(
            'https://iptv-org.github.io/iptv/index.m3u'
        );

        const text = await response.text();

        const lines = text.split('\n');

        let categories = new Set();


        for(let i = 0; i < lines.length - 1; i++) {

            if(lines[i].startsWith("#EXTINF")) {

                let info = lines[i];
                let url = lines[i+1].trim();


                let group = info.match(
                    /group-title="([^"]+)"/
                );

                let category = group
                    ? group[1]
                    : "Uncategorized";


                let name = info
                    .split(',')
                    .pop()
                    .trim();


                allChannels.push({
                    info,
                    url,
                    name,
                    category
                });


                categories.add(category);
            }
        }


        let select =
            document.getElementById(
                "categoryFilter"
            );


        [...categories]
        .sort()
        .forEach(cat => {

            let option =
                document.createElement("option");

            option.value = cat;
            option.innerText = cat;

            select.appendChild(option);

        });


        render(allChannels);


    } catch(error) {

        console.error(error);

        document.getElementById(
            "channel-list"
        ).innerHTML =
            "Failed to load channels";

    }

}



function render(list) {

    const container =
        document.getElementById(
            "channel-list"
        );


    container.innerHTML =
        list.map(channel => `

        <div class="channel-item">

            <input
                type="checkbox"
                ${selectedUrls.includes(channel.url)
                    ? "checked"
                    : ""
                }
                onchange="toggleChannel('${escapeQuotes(channel.url)}')"
            >

            <span>
                ${channel.name}
                <small style="color:#777">
                    (${channel.category})
                </small>
            </span>

        </div>

        `).join('');

}



function escapeQuotes(str) {

    return str
        .replace(/'/g,"\\'")
        .replace(/"/g,'\\"');

}



function filterChannels() {

    let term =
        document
        .getElementById("search")
        .value
        .toLowerCase();


    let category =
        document
        .getElementById("categoryFilter")
        .value;


    let filtered =
        allChannels.filter(c =>

            c.name
            .toLowerCase()
            .includes(term)

            &&

            (
                category === "All"
                ||
                c.category === category
            )

        );


    render(filtered);

}



async function toggleChannel(url) {


    if(selectedUrls.includes(url)) {

        selectedUrls =
            selectedUrls.filter(
                u => u !== url
            );

    } else {

        selectedUrls.push(url);

    }


    updateCounter();


    await fetch('/api/channels', {

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:
        JSON.stringify(selectedUrls)

    });

}



function updateCounter() {

    document
    .getElementById("selected-count")
    .innerText =
        selectedUrls.length;

}



async function triggerGenerate() {


    let button =
        event.target;


    button.innerText =
        "Generating...";


    await fetch('/api/generate', {
        method:"POST"
    });


    button.innerText =
        "Generate M3U Now";


    alert(
        "Playlist generated!"
    );

}



init();

</script>


</body>
</html>
